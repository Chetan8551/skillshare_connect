{% extends 'base.html' %}
{% block content %}
<!-- Add Skill Page -->
<div class="container mx-auto px-6 py-12">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl p-8">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">Add Skill</h1>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="space-y-6">
                    {% for field in form %}
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                        {% endif %}
                        {% if field.help_text %}
                            <p class="text-gray-500 text-sm mt-1">{{ field.help_text }}</p>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                
                <div class="mt-8 flex space-x-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-blue-500 to-purple-600 text-white py-4 rounded-2xl font-semibold text-lg hover:from-blue-600 hover:to-purple-700 transition">
                        Add Skill
                    </button>
                    <a href="{% url 'profile' %}" class="flex-1 border-2 border-gray-300 text-gray-700 py-4 rounded-2xl font-semibold text-lg hover:border-gray-400 transition text-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
