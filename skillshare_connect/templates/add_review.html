{% extends 'base.html' %}
{% block content %}
<!-- Add Review Page -->
<div class="container mx-auto px-6 py-12">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl p-8">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">Review Session</h1>
            
            <div class="mb-6 p-6 bg-gray-50 rounded-xl">
                <h2 class="text-xl font-semibold mb-2">{{ session.title }}</h2>
                <p class="text-gray-600">with {{ session.teacher.get_full_name }}</p>
                <p class="text-sm text-gray-500">{{ session.scheduled_time|date:"M d, Y" }}</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Rating</label>
                    <div class="flex space-x-1" id="rating-stars">
                        {% for i in "12345" %}
                        <button type="button" class="text-2xl text-gray-300 hover:text-yellow-400 rating-star" data-value="{{ forloop.counter }}">
                            <i class="far fa-star"></i>
                        </button>
                        {% endfor %}
                    </div>
                    <input type="hidden" name="rating" id="rating-value" value="5" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Review</label>
                    <textarea name="comment" rows="5" 
                              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 transition"
                              placeholder="Share your experience with this session..." required></textarea>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-4 rounded-2xl font-semibold text-lg hover:from-blue-600 hover:to-purple-700 transition">
                    Submit Review
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const stars = document.querySelectorAll('.rating-star');
        const ratingValue = document.getElementById('rating-value');
        
        stars.forEach(star => {
            star.addEventListener('click', function() {
                const value = this.getAttribute('data-value');
                ratingValue.value = value;
                
                // Update star display
                stars.forEach((s, index) => {
                    if (index < value) {
                        s.innerHTML = '<i class="fas fa-star text-yellow-400"></i>';
                    } else {
                        s.innerHTML = '<i class="far fa-star text-gray-300"></i>';
                    }
                });
            });
        });
        
        // Initialize with 5 stars
        stars[4].click();
    });
</script>
{% endblock %}
