{% extends "base.html" %}
{% block content %}
<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f7f9fc;">
    <div style="background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);width:100%;max-width:400px;">
        <h2 style="text-align:center;color:#0d6efd;margin-bottom:30px;font-family:Arial, sans-serif;">Forgot Password</h2>

        {% if messages %}
            {% for message in messages %}
                <div style="background:#f8d7da;color:#842029;padding:10px;border-radius:5px;margin-bottom:15px;font-family:Arial, sans-serif;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom:20px;">
                <label for="email" style="display:block;margin-bottom:5px;font-weight:bold;">Registered Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required 
                       style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;">
            </div>
            <button type="submit" style="width:100%;padding:12px;background:#0d6efd;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">
                Send OTP
            </button>
            <div style="margin-top:15px;text-align:center;">
                <a href="{% url 'auth' %}" style="color:#6c757d;text-decoration:none;font-size:14px;">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
