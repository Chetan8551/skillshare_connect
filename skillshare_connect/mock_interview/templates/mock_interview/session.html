<!-- skillshare_connect/mock_interview/templates/mock_interview/session.html -->
{% extends "base.html" %}
{% block content %}
  <h2>Question</h2>
  <div style="border:1px solid #ddd;padding:12px;border-radius:6px;">
    <strong>{{ session.question }}</strong>
  </div>
  <p>Skill: {{ session.skill }}</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit Answer</button>
  </form>

  <p><a href="{% url 'mock_interview:index' %}">Back to start</a></p>
{% endblock %}
